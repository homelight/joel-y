name: Verify Joel-y release

on:
  pull_request:
    branches:
      - main

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release invariants
        run: ./scripts/verify-release.sh "origin/${{ github.base_ref }}"
